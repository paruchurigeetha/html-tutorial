<!DOCTYPE html>
<html>
<head>
<title>Lists Practice</title>

<style>
body{
    background:#f5e6ca;
    font-family:Arial;
    padding:30px;
}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{text-align:center;}
</style>

<body>

<h1>HTML Lists Practice</h1>

<!-- PRACTICE 1 -->
<div class="section">
<h3>1. Unordered List</h3>
<ul>
<li style="color:red;">Apple</li>
<li style="color:green;">Banana</li>
<li style="color:blue;">Mango</li>
</ul>
</div>

<!-- PRACTICE 2 -->
<div class="section">
<h3>2. Ordered List</h3>
<ol>
<li>Step One</li>
<li>Step Two</li>
<li>Step Three</li>
</ol>
</div>

<!-- PRACTICE 3 -->
<div class="section">
<h3>3. Nested List</h3>
<ul>
<li>Fruits
    <ul>
        <li>Apple</li>
        <li>Banana</li>
    </ul>
</li>
<li>Vegetables
    <ul>
        <li>Carrot</li>
        <li>Potato</li>
    </ul>
</li>
</ul>
</div>
