<!DOCTYPE html>
<html>
<head>
<title>Tables Practice</title>

<style>
body{
    background:#f5e6ca;
    font-family:Arial;
    padding:30px;
}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    border:1px solid black;
    padding:8px;
    text-align:center;
}

th{
    background:lightgray;
}

h1{text-align:center;}
</style>
</head>

<body>

<h1>HTML Tables Practice</h1>

<!-- PRACTICE 1 -->
<div class="section">
<h3>1. Basic Table</h3>

<table>
<tr>
<th>Name</th>
<th>Branch</th>
</tr>

<tr>
<td>Geetha</td>
<td>CSE</td>
</tr>

<tr>
<td>Rahul</td>
<td>ECE</td>
</tr>
</table>
</div>

<!-- PRACTICE 2 -->
<div class="section">
<h3>2. Table with Colors</h3>

<table>
<tr style="background:lightblue;">
<th>Name</th>
<th>Marks</th>
</tr>

<tr>
<td style="color:red;">Geetha</td>
<td>95</td>
</tr>

<tr>
<td style="color:green;">Rahul</td>
<td>88</td>
</tr>
</table>
</div>

<!-- PRACTICE 3 -->
<div class="section">
<h3>3. Table with Colspan</h3>

<table>
<tr>
<th colspan="2">Student Details</th>
</tr>

<tr>
<td>Name</td>
<td>Geetha</td>
</tr>

<tr>
<td>Branch</td>
<td>CSE</td>
</tr>
</table>
</div>

<br><br>
<a href="html_tables.html">⬅ Back</a>

</body>
</html>
