<!DOCTYPE html>
<html>
<head>
<style>
body{background:#f5e6ca;padding:30px;font-family:Arial;}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}

.btn{
    padding:10px 20px;
    background:blue;
    color:white;
    border:none;
    cursor:pointer;
}

.btn:hover{
    background:red;
}

.round{
    border-radius:20px;
}

.outline{
    background:white;
    color:blue;
    border:2px solid blue;
}
</style>
</head>

<body>

<h1>Button Practice</h1>

<!-- 1 -->
<div class="section">
<h3>1. Basic Button</h3>
<button class="btn">Click Me</button>
</div>

<!-- 2 -->
<div class="section">
<h3>2. Rounded Button</h3>
<button class="btn round">Rounded</button>
</div>

<!-- 3 -->
<div class="section">
<h3>3. Outline Button</h3>
<button class="outline">Outline Button</button>
</div>

<!-- 4 -->
<div class="section">
<h3>4. Hover Effect</h3>
<button class="btn">Hover Me</button>
</div>

<br><br>
<a href="css_buttons.html">⬅ Back</a>

</body>
</html>
