<!DOCTYPE html>
<html>
<head>
<title>Forms Practice</title>

<style>
body{
    background:#f5e6ca;
    font-family:Arial;
    padding:30px;
}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{text-align:center;}
</style>
</head>

<body>

<h1>HTML Forms Practice</h1>

<!-- PRACTICE 1 -->
<div class="section">
<h3>1. Basic Form</h3>

<input type="text" placeholder="Enter Name"><br><br>
<input type="email" placeholder="Enter Email"><br><br>
<input type="password" placeholder="Enter Password"><br><br>

<button style="background:green;color:white;">Submit</button>
</div>

<!-- PRACTICE 2 -->
<div class="section">
<h3>2. Radio Buttons & Checkbox</h3>

<p><b>Gender:</b></p>
<input type="radio" name="g"> Male
<input type="radio" name="g"> Female

<br><br>

<p><b>Skills:</b></p>
<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> JavaScript
</div>

<!-- PRACTICE 3 -->
<div class="section">
<h3>3. Dropdown & Textarea</h3>

<select>
<option>Select Branch</option>
<option>CSE</option>
<option>ECE</option>
</select>

<br><br>

<textarea rows="4" cols="30" placeholder="Enter feedback"></textarea>

<br><br>
<button style="background:blue;color:white;">Send</button>
</div>

<br><br>
<a href="html_forms.html">⬅ Back</a>

</body>
</html>
