<!DOCTYPE html>
<html>
<head>
<title>CSS Colors Practice</title>

<style>
body{
    background:#f5e6ca;
    font-family:Arial;
    padding:30px;
}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.box{
    padding:20px;
    margin-top:10px;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

h1{text-align:center;}
</style>
</head>

<body>

<h1>CSS Colors Practice</h1>

<!-- PRACTICE 1 -->
<div class="section">
<h3>1. Text Colors</h3>

<p style="color:red;">This is Red Text</p>
<p style="color:green;">This is Green Text</p>
<p style="color:blue;">This is Blue Text</p>

</div>

<!-- PRACTICE 2 -->
<div class="section">
<h3>2. Background Colors</h3>

<div class="box" style="background:red;">Red Background</div>
<div class="box" style="background:green;">Green Background</div>
<div class="box" style="background:blue;">Blue Background</div>

</div>

<!-- PRACTICE 3 -->
<div class="section">
<h3>3. HEX Colors</h3>

<div class="box" style="background:#ff5733;">HEX #ff5733</div>
<div class="box" style="background:#33c1ff;">HEX #33c1ff</div>

</div>

<!-- PRACTICE 4 -->
<div class="section">
<h3>4. RGB & RGBA</h3>

<div class="box" style="background:rgb(255,0,0);">RGB Red</div>
<div class="box" style="background:rgba(0,0,255,0.5);">RGBA Blue (Transparent)</div>

</div>

<!-- PRACTICE 5 -->
<div class="section">
<h3>5. Gradient Colors</h3>

<div style="height:100px;border-radius:10px;
background:linear-gradient(to right, red, yellow);">
</div>

</div>

<br><br>
<a href="css_colors.html">⬅ Back</a>

</body>
</html>
