<!DOCTYPE html>
<html>
<head>
<title>Shadows Practice</title>

<style>
body{
    background:#f5e6ca;
    font-family:Arial;
    padding:30px;
}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}

.box{
    background:lightblue;
    padding:20px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>CSS Shadows Practice</h1>

<!-- 1 -->
<div class="section">
<h3>1. Basic Box Shadow</h3>

<div class="box" style="box-shadow:5px 5px 10px gray;">
Box Shadow
</div>

</div>

<!-- 2 -->
<div class="section">
<h3>2. Strong Shadow</h3>

<div class="box" style="box-shadow:0 0 20px black;">
Glow Effect
</div>

</div>

<!-- 3 -->
<div class="section">
<h3>3. Text Shadow</h3>

<h2 style="text-shadow:2px 2px 5px gray;">Shadow Text</h2>

</div>

<!-- 4 -->
<div class="section">
<h3>4. Card UI Effect</h3>

<div style="background:white;padding:20px;border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);">
Card with Shadow
</div>

</div>

</html>
