<!DOCTYPE html>
<html>
<head>
<title>Alerts Practice</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5e6ca;
    padding:20px;
}
.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1 class="text-center">Alerts & Popup Practice</h1>

<!-- 1. BASIC ALERT -->
<div class="section">
<h3>1. Basic Alerts</h3>

<div class="alert alert-success">Success Message</div>
<div class="alert alert-danger">Error Message</div>
<div class="alert alert-warning">Warning Message</div>

</div>

<!-- 2. DISMISS ALERT -->
<div class="section">
<h3>2. Dismiss Alert</h3>

<div class="alert alert-primary alert-dismissible fade show">
Click close to remove this message
<button class="btn-close" data-bs-dismiss="alert"></button>
</div>

</div>

<!-- 3. POPUP (MODAL) -->
<div class="section">
<h3>3. Popup Message (Modal)</h3>

<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
Open Popup
</button>

<!-- Modal -->
<div class="modal fade" id="myModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Popup Message</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
This is a popup alert message using Bootstrap Modal.
</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
</div>

</div>
</div>
</div>

</div>

<a href="bootstrap_alerts.html">⬅ Back</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
