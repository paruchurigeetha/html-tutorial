<!DOCTYPE html>
<html>
<head>
<title>Images Practice</title>

<style>
body{
    background:#f5e6ca;
    font-family:Arial;
    padding:30px;
}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

img{
    margin:10px;
}

h1{text-align:center;}
</style>
</head>

<body>

<h1>HTML Images Practice</h1>

<!-- PRACTICE 1 -->
<div class="section">
<h3>1. Basic Image</h3>
<img src="anti.jpeg">
</div>

<!-- PRACTICE 2 -->
<div class="section">
<h3>2. Image with Size</h3>
<img src="hp.avif" width="200" height="100">
</div>

<!-- PRACTICE 3 -->
<div class="section">
<h3>3. Rounded Image</h3>
<img src="smart.jpeg"
     style="width:120px;height:120px;border-radius:50%;object-fit:cover;">
</div>

<!-- PRACTICE 4 -->
<div class="section">
<h3>4. Multiple Images</h3>
<img src="anti.jpeg">
<img src="hp.avif" style="width:120px;height:120px;border-radius:50%;object-fit:cover;">>
<img src="smart.jpeg">
</div>

</body>
</html>
