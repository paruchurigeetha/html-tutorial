<!DOCTYPE html>
<html>
<head>
<title>Bootstrap Practice</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5e6ca;
    padding:30px;
    font-family:Arial;
}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{text-align:center;}
</style>
</head>

<body>

<h1>Bootstrap Components Practice</h1>

<!-- ACCORDION -->
<div class="section">
<h3>1. Accordion</h3>

<div class="accordion" id="accordionExample">

<div class="accordion-item">
<h2 class="accordion-header">
<button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#one">
Accordion 1
</button>
</h2>
<div id="one" class="accordion-collapse collapse show">
<div class="accordion-body">Content 1</div>
</div>
</div>

<div class="accordion-item">
<h2 class="accordion-header">
<button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#two">
Accordion 2
</button>
</h2>
<div id="two" class="accordion-collapse collapse">
<div class="accordion-body">Content 2</div>
</div>
</div>

</div>
</div>

<!-- CARDS -->
<div class="section">
<h3>2. Cards</h3>

<div class="card" style="width:18rem;">
<img src="anti.jpeg" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Sample Card</h5>
<p class="card-text">Example text</p>
<button class="btn btn-primary">Click</button>
</div>
</div>

</div>

<!-- CAROUSEL -->
<div class="section">
<h3>3. Carousel</h3>

<div id="carouselExample" class="carousel slide">
<div class="carousel-inner">

<div class="carousel-item active">
<img src="hp.avif" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="smart.jpeg" class="d-block w-100">
</div>

</div>

<button class="carousel-control-prev" data-bs-target="#carouselExample" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" data-bs-target="#carouselExample" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>
</div>

<!-- LIST GROUP -->
<div class="section">
<h3>4. List Group</h3>

<div class="list-group">
<a class="list-group-item list-group-item-action active">Item 1</a>
<a class="list-group-item list-group-item-action">Item 2</a>
<a class="list-group-item list-group-item-action">Item 3</a>
</div>

</div>

<br>
<a href="bootstrap_components.html">⬅ Back</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
