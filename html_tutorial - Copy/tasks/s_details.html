<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        .form-container { 
            background: white; 
            padding: 20px; 
            border: 2px solid #333; 
            width: 350px;
            border-radius: 8px;
        }
        .form-group { margin-bottom: 15px; display: flex; align-items: center; }
        label { width: 80px; font-weight: bold; }
        input[type="text"], input[type="date"] { flex: 1; padding: 5px; border: 1px solid #333; }
        
        .skills-section { margin-top: 10px; border-top: 1px solid #eee; pt: 10px; }
        .checkbox-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
        
        button { 
            margin-top: 20px; 
            width: 100%; 
            padding: 10px; 
            background: #333; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background: #555; }
        #output { margin-top: 20px; background: #eee; padding: 10px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-group">
        <label>Name</label>
        <input type="text" id="userName" placeholder="Enter name">
    </div>
    
    <div class="form-group">
        <label>DOB</label>
        <input type="date" id="userDob">
    </div>
    
    <div class="form-group">
        <label>Branch</label>
        <input type="text" id="userBranch" placeholder="Enter branch">
    </div>

    <div class="skills-section">
        <label>Skills</label>
        <div class="checkbox-group">
            <label><input type="checkbox" name="skill" value="C"> C</label>
            <label><input type="checkbox" name="skill" value="Python"> Python</label>
            <label><input type="checkbox" name="skill" value="Java"> Java</label>
        </div>
    </div>

    <button onclick="generateObject()">ADD</button>
</div>

<div id="output">Object will appear here...</div>

<script>
    function generateObject() {
        // 1. Get simple text/date values
        const nameValue = document.getElementById('userName').value;
        const dobValue = document.getElementById('userDob').value;
        const branchValue = document.getElementById('userBranch').value;

        // 2. Get multiple selected skills using map
        const selectedSkills = Array.from(document.querySelectorAll('input[name="skill"]:checked'))
                                    .map(checkbox => checkbox.value);

        // 3. Create the final object
        const userData = {
            name: nameValue,
            dob: dobValue,
            branch: branchValue,
            skills: selectedSkills
        };

        // 4. Display the result
        console.log("Generated Object:", userData);
        document.getElementById('output').innerText = JSON.stringify(userData, null, 4);
    }
</script>

</body>
</html>
