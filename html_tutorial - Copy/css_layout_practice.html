<!DOCTYPE html>
<html>
<head>
<style>
body{background:#f5e6ca;padding:30px;font-family:Arial;}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}

.container{
    display:flex;
    gap:10px;
}

.box{
    background:lightblue;
    padding:20px;
}
</style>
</head>

<body>

<h1>Flexbox Practice</h1>

<!-- 1 -->
<div class="section">
<h3>1. Horizontal Layout</h3>
<div class="container">
<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>
</div>
</div>

<!-- 2 -->
<div class="section">
<h3>2. Center Alignment</h3>
<div style="display:flex;justify-content:center;">
<div class="box">Centered</div>
</div>
</div>

<!-- 3 -->
<div class="section">
<h3>3. Space Between</h3>
<div style="display:flex;justify-content:space-between;">
<div class="box">Left</div>
<div class="box">Right</div>
</div>
</div>

<br><br>
<a href="css_layout.html">⬅ Back</a>

</body>
</html>
