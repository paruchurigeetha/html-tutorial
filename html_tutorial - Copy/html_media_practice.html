<!DOCTYPE html>
<html>
<head>
<title>Media Practice</title>

<style>
body{
    background:#f5e6ca;
    font-family:Arial;
    padding:30px;
}

.section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

video, audio{
    margin-top:10px;
}

h1{text-align:center;}
</style>
</head>

<body>

<h1>HTML Media Practice</h1>

<!-- PRACTICE 1 -->
<div class="section">
<h3>1. Basic Video</h3>

<video width="300" controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

</div>

<!-- PRACTICE 2 -->
<div class="section">
<h3>2. Video with Autoplay (Muted)</h3>

<video width="300" autoplay muted loop>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>

</div>

<!-- PRACTICE 3 -->
<div class="section">
<h3>3. Audio Player</h3>

<audio controls>
<source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
</audio>

</div>

<br><br>
<a href="html_media.html">⬅ Back</a>

</body>
</html>
